name: 'Run scan and submit coverage Sonarqube'
on:
  workflow_run:
    workflows: ['🧪']
    types:
      - completed
permissions:
  actions: read
  contents: read
  pull-requests: write
jobs:
  sonarqube_pr:
    name: SonarQube analysis
    if: ${{ github.event.workflow_run.conclusion != 'cancelled' }}
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7
        with:
          fetch-depth: 0
      - name: Create temporary directories
        run: |
          mkdir -p ${{ runner.temp }}/artifacts/nyc_output
          mkdir .nyc_output
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: coverage-vitest-sonarqube
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: ${{ runner.temp }}/artifacts/nyc_output
      - run: mv ${{ runner.temp }}/artifacts/nyc_output/lcov.info ./.nyc_output
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        if: ${{ github.event.workflow_run.event == 'pull_request' }}
        with:
          name: prnumber
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: ${{ runner.temp }}/artifacts
      - name: Add pr number to output
        if: ${{ github.event.workflow_run.event == 'pull_request' }}
        id: prnumber
        run: echo "pr_number=$(cat ${{ runner.temp }}/artifacts/prnumber.txt)" >> $GITHUB_OUTPUT
      - name: SonarQube Scan PR
        if: ${{github.event.workflow_run.event == 'pull_request'}}
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.javascript.lcov.reportPaths=${{ runner.temp }}/artifacts/nyc_output/lcov.info
            -Dsonar.pullrequest.key=${{ steps.prnumber.outputs.pr_number }}
            -Dsonar.pullrequest.base=${{ github.event.workflow_run.pull_requests[0].base.ref }}
            -Dsonar.pullrequest.branch=${{ github.event.workflow_run.pull_requests[0].head.ref }}
      - name: SonarQube Scan Branch
        if: ${{github.event.workflow_run.event == 'push'}}
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.javascript.lcov.reportPaths=${{ runner.temp }}/artifacts/nyc_output/lcov.info
            -Dsonar.branch.name=${{ github.event.workflow_run.head_branch }}

