name: 'Comment coverage on PR'
on:
  workflow_run:
    workflows: ['🧪']
    types:
      - completed
permissions:
  actions: read
  contents: read
  pull-requests: write
jobs:
  coverage:
    env:
      unique_id: <!-- coverage-report -->
    name: Coverage reporting
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout actions
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7
        with:
          sparse-checkout: |
            .github
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: coverage-vitest
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: ${{ runner.temp }}/artifacts
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: prnumber
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: ${{ runner.temp }}/artifacts
      - name: Add pr number to output
        id: prnumber
        run: echo "pr_number=$(cat ${{ runner.temp }}/artifacts/prnumber.txt)" >> $GITHUB_OUTPUT
      - name: Build the report
        id: report
        run: |
          echo "\`\`\`" > ./cov.txt
          cat ${{ runner.temp }}/artifacts/coverage-summary.txt >> ./cov.txt
          echo "\`\`\`" >> ./cov.txt
          echo "${{ env.unique_id }}" >> ./cov.txt
      - name: Comment on PR for coverage
        uses: ./.github/actions/find-create-or-update-comment
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          issue-number: ${{ steps.prnumber.outputs.pr_number }}
          body-includes: '${{ env.unique_id }}'
          comment-author: 'github-actions[bot]'
          body-path: ./cov.txt
          edit-mode: replace
