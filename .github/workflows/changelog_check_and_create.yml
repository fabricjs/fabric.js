name: 'Check and create Changelog 📋'

on:
  pull_request_target:
    branches: [master, 6.x]
    types: [opened, synchronize, reopened, edited]
permissions:
  pull-requests: write
jobs:
  changelog-creation:
    runs-on: ubuntu-24.04
    steps:
      - name: Check changelog and comment on PR
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v6.4.1
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pr = context.payload.pull_request;
            const marker = '<!-- changelog-reminder -->';
            const link = `[#${pr.number}](https://github.com/${owner}/${repo}/pull/${pr.number})`;
            const expectedLine = `- ${pr.title} ${link}`;
            const previousTitle = context.payload.changes?.title?.from;
            const previousLine = previousTitle ? `- ${previousTitle} ${link}` : '';

            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner,
              repo,
              pull_number: pr.number,
              per_page: 100,
            });
            const changelogFile = files.find((file) => file.filename === 'CHANGELOG.md');
            const patch = changelogFile?.patch || '';
            const hasExpectedLine = patch.includes(expectedLine);
            const hasPreviousLine = previousLine && patch.includes(previousLine);

            let failureReason = '';
            if (!changelogFile) {
              failureReason = 'CHANGELOG.md was not modified in this pull request.';
            } else if (!hasExpectedLine) {
              failureReason =
                previousTitle && previousTitle !== pr.title && hasPreviousLine
                  ? 'The PR title changed, but the changelog entry still matches the previous title.'
                  : 'CHANGELOG.md does not contain the expected changelog line for the current PR title.';
            }

            const commentBody = [
              marker,
              'The changelog entry is missing or stale for this pull request.',
              '',
              'Expected line under `## [next]`:',
              '',
              `\`${expectedLine}\``,
            ].join('\n');

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number: pr.number,
              per_page: 100,
            });
            const existingComment = comments.find(
              (comment) =>
                comment.user?.login === 'github-actions[bot]' &&
                typeof comment.body === 'string' &&
                comment.body.includes(marker),
            );

            if (failureReason) {
              if (existingComment) {
                await github.rest.issues.updateComment({
                  owner,
                  repo,
                  comment_id: existingComment.id,
                  body: commentBody,
                });
              } else {
                await github.rest.issues.createComment({
                  owner,
                  repo,
                  issue_number: pr.number,
                  body: commentBody,
                });
              }
              core.setFailed(failureReason);
              return;
            }

            if (existingComment) {
              await github.rest.issues.deleteComment({
                owner,
                repo,
                comment_id: existingComment.id,
              });
            }
