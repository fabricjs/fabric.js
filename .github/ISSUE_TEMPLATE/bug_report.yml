name: 🐛 Bug Report
description: File a bug report
title: '[Bug]: '
body:
  - type: markdown
    attributes:
      value: |
        Please share a minimal bug report so we can reproduce and fix it quickly.
        For questions, use Discussions: https://github.com/fabricjs/fabric.js/discussions
  - type: checkboxes
    id: terms
    attributes:
      label: Before submitting
      options:
        - label: I agree to follow this project's Code of Conduct
          required: true
        - label: I searched existing issues and discussions
          required: true
  - type: input
    id: version
    attributes:
      label: Version
      description: e.g. 7.2.0
    validations:
      required: true
  - type: dropdown
    id: environments
    attributes:
      label: Environment
      multiple: true
      options:
        - Firefox
        - Chrome
        - Safari
        - Opera
        - Microsoft Edge
        - Node.js
  - type: input
    id: reproduction_link
    attributes:
      label: Link To Reproduction
      description: Provide a minimal repro when possible
    validations:
      required: false
  - type: textarea
    id: steps
    attributes:
      label: Steps To Reproduce
      value: |
        1. 
        2. 
        3.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Logs, stack trace, screenshots, and any extra details
    validations:
      required: false
